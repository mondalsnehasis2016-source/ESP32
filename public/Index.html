<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b0f14;
    color: #e5e7eb;
}

.dashboard {
    padding: 15px;
    display: grid;
    grid-template-columns: 1fr;
    gap: 15px;
}

.card {
    padding: 16px;
    border-radius: 16px;
    background: rgba(20, 25, 32, 0.85);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow: 0 0 25px rgba(0,0,0,0.5);
}

h2 {
    font-size: 0.9rem;
    opacity: 0.7;
    margin: 0 0 10px 0;
}

.value-big {
    font-size: 2.5rem;
    text-align: center;
}

.xyz-values {
    display: flex;
    justify-content: space-around;
    margin-top: 8px;
    font-size: 0.9rem;
    opacity: 0.8;
}

.units {
    text-align: center;
    font-size: 0.8rem;
    opacity: 0.6;
}

.status {
    margin-top: 10px;
    padding: 5px 10px;
    border-radius: 8px;
    font-size: 0.75rem;
    display: inline-block;
}

.safe { background: rgba(16,163,127,0.2); color: #10a37f; }
.normal { background: rgba(234,179,8,0.15); color: #eab308; }
.danger { background: rgba(239,68,68,0.15); color: #ef4444; }

.bar {
    margin-top: 10px;
    height: 5px;
    background: #1f2937;
    border-radius: 10px;
    position: relative;
}

.indicator {
    position: absolute;
    top: -4px;
    width: 12px;
    height: 12px;
    background: #10a37f;
    border-radius: 50%;
    box-shadow: 0 0 8px #10a37f;
}

canvas {
    width: 100% !important;
    height: 160px !important;
}

@media(min-width:600px){
    .dashboard {
        grid-template-columns: 1fr 1fr;
    }
}
</style>
</head>

<body>

<div class="dashboard">

    <div class="card">
        <h2>Temperature</h2>
        <div class="value-big" id="celsius">--°C</div>
        <div class="units" id="otherUnits">-- K | -- °F</div>
        <div class="status" id="status">--</div>
        <div class="bar"><div class="indicator" id="indicator"></div></div>
    </div>

    <div class="card">
        <h2>Voltage</h2>
        <div class="value-big" id="voltage">-- V</div>
    </div>

    <div class="card">
        <h2>Vibration Sensor 1 (X Y Z)</h2>
        <div class="xyz-values">
            <span id="ax1">X: --</span>
            <span id="ay1">Y: --</span>
            <span id="az1">Z: --</span>
        </div>
        <canvas id="chart1"></canvas>
    </div>

    <div class="card">
        <h2>Vibration Sensor 2 (X Y Z)</h2>
        <div class="xyz-values">
            <span id="ax2">X: --</span>
            <span id="ay2">Y: --</span>
            <span id="az2">Z: --</span>
        </div>
        <canvas id="chart2"></canvas>
    </div>

</div>

<script>
function classifyTemp(temp) {
    if (temp < 20) return "safe";
    if (temp < 40) return "normal";
    return "danger";
}

function updateTempUI(temp) {
    const kelvin = (temp + 273.15).toFixed(2);
    const fahrenheit = ((temp * 9/5) + 32).toFixed(2);

    document.getElementById("celsius").innerText = temp + "°C";
    document.getElementById("otherUnits").innerText = `${kelvin} K | ${fahrenheit} °F`;

    const status = classifyTemp(temp);
    const statusEl = document.getElementById("status");

    statusEl.className = "status " + status;
    statusEl.innerText = status.toUpperCase();

    const percent = Math.min(100, Math.max(0, temp * 2));
    document.getElementById("indicator").style.left = percent + "%";
}

function createXYZChart(ctx) {
    return new Chart(ctx, {
        type: 'line',
        data: {
            labels: [],
            datasets: [
                { label: 'X', data: [], tension: 0.4, borderWidth: 2, pointRadius: 0, fill: false },
                { label: 'Y', data: [], tension: 0.4, borderWidth: 2, pointRadius: 0, fill: false },
                { label: 'Z', data: [], tension: 0.4, borderWidth: 2, pointRadius: 0, fill: false }
            ]
        },
        options: {
            responsive: true,
            animation: false,
            plugins: { legend: { display: true } },
            scales: {
                x: { display: false },
                y: { beginAtZero: true }
            }
        }
    });
}

const chart1 = createXYZChart(document.getElementById('chart1'));
const chart2 = createXYZChart(document.getElementById('chart2'));

function updateXYZ(chart, x, y, z) {
    if (chart.data.labels.length > 30) {
        chart.data.labels.shift();
        chart.data.datasets.forEach(ds => ds.data.shift());
    }

    chart.data.labels.push('');
    chart.data.datasets[0].data.push(x);
    chart.data.datasets[1].data.push(y);
    chart.data.datasets[2].data.push(z);

    chart.update();
}

let eventSource;

function connectSSE() {
    eventSource = new EventSource('/api/stream');

    eventSource.onmessage = function(event) {
        const d = JSON.parse(event.data);

        console.log("Incoming Data:", d);

        updateTempUI(d.temperature);
        document.getElementById("voltage").innerText = d.voltage + " V";

        document.getElementById("ax1").innerText = "X: " + d.ax1;
        document.getElementById("ay1").innerText = "Y: " + d.ay1;
        document.getElementById("az1").innerText = "Z: " + d.az1;

        document.getElementById("ax2").innerText = "X: " + d.ax2;
        document.getElementById("ay2").innerText = "Y: " + d.ay2;
        document.getElementById("az2").innerText = "Z: " + d.az2;

        updateXYZ(chart1, d.ax1, d.ay1, d.az1);
        updateXYZ(chart2, d.ax2, d.ay2, d.az2);
    };

    eventSource.onerror = function() {
        eventSource.close();
        setTimeout(connectSSE, 3000);
    };
}

connectSSE();
</script>

</body>
</html>
